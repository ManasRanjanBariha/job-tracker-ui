<div class="apps-table-hdr">
    <span>Role / Company</span><span>Salary</span><span>Applied</span><span>Stage</span>
</div>

<div class="apps-row" *ngFor="let app of applications" (click)="navigationToApplicationDetail(app.id)">
    <div class="app-co">
        <div class="app-logo" style="background:linear-gradient(135deg,#4285f4,#1a73e8)">G</div>
        <div>
            <div class="app-role-title">{{ app.role }}</div>
            <div class="app-co-name">{{ app.company }}</div>
        </div>
    </div>
    <div class="app-salary">{{ app.salary | lac }}</div>
    <div class="app-date">{{ app.appliedDate | appDate }}</div>
    <div><span class="stage-pill" [ngClass]="getStageClass(app.stage)">⟳ {{ app.stage }}</span></div>
</div>
