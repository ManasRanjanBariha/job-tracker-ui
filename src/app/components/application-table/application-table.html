<div class="apps-table-hdr">
    <span>Role / Company</span><span>Location</span><span>Salary</span><span>Applied</span><span>Stage</span>
</div>

<div class="apps-row" *ngFor="let app of applications">
    <div class="app-co">
        <div class="app-logo" style="background:linear-gradient(135deg,#4285f4,#1a73e8)">G</div>
        <div>
            <div class="app-role-title">Senior Frontend Dev</div>
            <div class="app-co-name">Google</div>
        </div>
    </div>
    <div class="app-location">Remote / Hyd</div>
    <div class="app-salary">₹55–80L</div>
    <div class="app-date">Feb 28</div>
    <div><span class="stage-pill interview">⟳ Interview</span></div>
</div>
