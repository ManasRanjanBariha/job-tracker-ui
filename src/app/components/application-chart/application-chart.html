<div class="chart-wrap">
    <div class="chart-area">
        <div class="bar-group">
            <div class="cbar" style="height:35%;background:var(--accent);animation-delay:.05s"></div>
            <div class="cbar" style="height:18%;background:var(--yellow);animation-delay:.08s"></div>
        </div>
        <div class="bar-group">
            <div class="cbar" style="height:55%;background:var(--accent);animation-delay:.1s"></div>
            <div class="cbar" style="height:28%;background:var(--yellow);animation-delay:.13s"></div>
        </div>
        <div class="bar-group">
            <div class="cbar" style="height:30%;background:var(--accent);animation-delay:.15s"></div>
            <div class="cbar" style="height:14%;background:var(--yellow);animation-delay:.18s"></div>
        </div>
        <div class="bar-group">
            <div class="cbar" style="height:72%;background:var(--accent);animation-delay:.2s"></div>
            <div class="cbar" style="height:40%;background:var(--yellow);animation-delay:.23s"></div>
        </div>
        <div class="bar-group">
            <div class="cbar" style="height:45%;background:var(--accent);animation-delay:.25s"></div>
            <div class="cbar" style="height:55%;background:var(--yellow);animation-delay:.28s"></div>
        </div>
        <div class="bar-group">
            <div class="cbar" style="height:85%;background:var(--accent);animation-delay:.3s"></div>
            <div class="cbar" style="height:48%;background:var(--yellow);animation-delay:.33s"></div>
        </div>
        <div class="bar-group">
            <div class="cbar" style="height:62%;background:var(--accent);animation-delay:.35s"></div>
            <div class="cbar" style="height:36%;background:var(--yellow);animation-delay:.38s"></div>
        </div>
    </div>
    <div class="chart-labels">
        <span class="clbl">Sep</span><span class="clbl">Oct</span><span class="clbl">Nov</span><span
            class="clbl">Dec</span><span class="clbl">Jan</span><span class="clbl">Feb</span><span
            class="clbl">Mar</span>
    </div>
    <div class="chart-legend">
        <div class="leg-item">
            <div class="leg-dot" style="background:var(--accent)"></div>Applications
        </div>
        <div class="leg-item">
            <div class="leg-dot" style="background:var(--yellow)"></div>Interviews
        </div>
    </div>
</div>
