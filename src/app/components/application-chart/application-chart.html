<div class="chart-wrap">
    <div class="chart-area" *ngIf="chartData().length > 0; else noData">
        <div class="bar-group" *ngFor="let data of chartData(); let i = index">
            <div class="cbar" [ngStyle]="{'height.px': getBarHeight(data.jobs_applied, getMaxApplications())}" style="background:var(--accent);" [style.animation-delay]="(i * 0.05 + 0.05) + 's'"></div>
            <div class="cbar" [ngStyle]="{'height.px': getBarHeight(data.interviews_attended, getMaxInterviews())}" style="background:var(--yellow);" [style.animation-delay]="(i * 0.05 + 0.08) + 's'"></div>
        </div>
    </div>
    <ng-template #noData>
        <div class="chart-area" style="justify-content: center; align-items: center;">
            <p style="color: var(--muted);">No data available</p>
        </div>
    </ng-template>
    <div class="chart-labels">
        <span class="clbl" *ngFor="let data of chartData()">{{ data.month }}</span>
    </div>
    <div class="chart-legend">
        <div class="leg-item">
            <div class="leg-dot" style="background:var(--accent)"></div>Applications
        </div>
        <div class="leg-item">
            <div class="leg-dot" style="background:var(--yellow)"></div>Interviews
        </div>
    </div>
</div>
