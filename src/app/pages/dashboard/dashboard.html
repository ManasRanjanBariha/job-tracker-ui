<app-sidebar></app-sidebar>
<div class="main">
  <app-topbar  (addApplication)="openModal()"></app-topbar>
  <div class="content">

    <app-stat-row [totalApplied]="totalApplied" [interviews]="interviews" [offers]="offers" [responseRate]="responseRate" [avgDaysPerStage]="avgDaysPerStage"></app-stat-row>
    <div class="dash-grid">
        <div class="main-col">
            <app-dashboard-card title="📋 Recent Applications" actionText="View All →">
                <app-application-table [applications]="applications()"></app-application-table>
             </app-dashboard-card>
             <app-dashboard-card title="📈 Applications Over Time" >
              <app-application-chart [last7MonthsData]="last7Months()"></app-application-chart>
             </app-dashboard-card>
             <app-dashboard-card title="🔽 Application Funnel" actionText="Full Analytics →">
              <app-application-funnel [funnelData]="funnelData()"></app-application-funnel>

             </app-dashboard-card>
        </div>
        <div class="side-col">
            <app-dashboard-card title="📅 This Week" actionText="All →"> 
              <app-upcoming-interview-list></app-upcoming-interview-list>  
            </app-dashboard-card>
            <app-dashboard-card title="⚡ Recent Activity">
              <app-upcoming-interview-list></app-upcoming-interview-list>
            </app-dashboard-card>
            <app-dashboard-card title="🎯 March Goals" actionText="Edit">
              <app-goal-card></app-goal-card>
            </app-dashboard-card>
            <app-dashboard-card title="⚡ Quick Actions">
              <app-quick-action-card (addApplication)="openModal()"></app-quick-action-card>
             </app-dashboard-card>
        </div>
    </div>
  </div>
</div>

<!-- Job Modal -->
<app-job-modal [isOpen]="isModalOpen()" (modalClose)="closeModal()"></app-job-modal>
